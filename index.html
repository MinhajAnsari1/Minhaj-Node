<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhaj Node | Premium Hosting</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="BlockHost - Professional Minecraft server hosting with NVMe SSD, DDoS protection, and 24/7 support. Starting at $0.5/mo.">
    <meta name="keywords" content="Minecraft hosting, VPS, game server hosting, MC hosting">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        minecraft: {
                            dark: '#0D1117',
                            panel: '#161B22',
                            card: '#21262D',
                            border: '#30363D',
                            green: '#4ADE80',
                            blue: '#3B82F6',
                            red: '#EF4444',
                            yellow: '#FBBF24',
                            purple: '#A855F7'
                        },
                        brand: {
                            primary: '#4ADE80',
                            secondary: '#3B82F6',
                            dark: '#0f172a',
                            light: '#64748b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <style>
        :root {
            --bg-dark: #0D1117;
            --bg-panel: #161B22;
            --bg-card: #21262D;
            --border-color: #30363D;
            --brand-green: #4ADE80;
            --brand-blue: #3B82F6;
            --text-primary: #F0F6FC;
            --text-secondary: #8B949E;
        }
        
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) var(--bg-dark);
        }
        
        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        *::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        *::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 4px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
        }
        
        .glass {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
        }
        
        .glow-green {
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }
        
        .glow-blue {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .nav-link {
            position: relative;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--brand-green);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        .page-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .page-section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Console styling */
        .console-font {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }
        
        /* Progress bar animations */
        @keyframes progress {
            0% { width: 0%; }
            100% { width: var(--progress); }
        }
        
        .progress-animate {
            animation: progress 1.5s ease-out forwards;
        }
        
        /* Custom input styling */
        input, select, textarea {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--brand-green) !important;
            box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.2);
        }
        
        /* Button styles */
        .btn-primary {
            background: linear-gradient(135deg, var(--brand-green), #22c55e);
            color: var(--bg-dark);
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 222, 128, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: var(--brand-green);
            color: var(--brand-green);
        }
        
        /* Table styling */
        table {
            border-collapse: separate;
            border-spacing: 0;
        }
        
        th {
            background: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        /* Status indicators */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-online {
            background: var(--brand-green);
            box-shadow: 0 0 8px var(--brand-green);
        }
        
        .status-offline {
            background: var(--text-secondary);
        }
        
        .status-starting {
            background: var(--brand-blue);
            animation: pulse 1s infinite;
        }
        
        .status-stopping {
            background: #FBBF24;
            animation: pulse 1s infinite;
        }
        
        /* File browser styling */
        .file-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
    </style>
</head>

                <button onclick="navigateTo('features')" class="block w-full text-left px-4 py-2 text-gray-300 hover:text-white hover:bg-minecraft-card rounded-md">Features</button>

                <button onclick="navigateTo('register')" class="block w-full text-left px-4 py-2 text-brand-primary font-medium">Get Started</button>

    </nav>
